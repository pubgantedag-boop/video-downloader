name: Download and split

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'URL of the video to download'
        required: true
      file_name:
        description: 'Base name for output files (e.g. video.mp4)'
        required: true
        default: 'video.mp4'
      commit_message:
        description: 'Commit message'
        default: 'Add downloaded video (split into parts)'

permissions:
  contents: write

jobs:
  download-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3.1.2
      
      - name: Download video with yt-dlp
        run: |
          yt-dlp -o "${{ github.event.inputs.file_name }}" "${{ github.event.inputs.file_url }}"

      - name: Split file into 95MB chunks
        run: |
          mkdir -p parts
          split -b 95M -d --additional-suffix="_${{ github.event.inputs.file_name }}.part" "${{ github.event.inputs.file_name }}" parts/
          rm "${{ github.event.inputs.file_name }}"
          echo "File split into $(ls parts/ | wc -l) parts"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add parts/
          git commit -m "${{ github.event.inputs.commit_message }}" || echo "No changes to commit"
          git push
